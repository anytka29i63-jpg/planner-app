<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все мероприятия • Планер техникума</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-calendar-week"></i> Все мероприятия</h1>
        <div>
            <a href="/" class="btn btn-outline-secondary">← Общий планер</a>
            <a href="/dashboard" class="btn btn-outline-primary">Мой дашборд</a>
        </div>
    </div>
    <div class="mb-3">
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-primary" id="showTodayBtn">Сегодня</button>
            <button type="button" class="btn btn-outline-primary" id="showMonthBtn">Текущий месяц</button>
        </div>
    </div>
    <div id="cardsContainer" class="row g-4"></div>
</div>
<script>
    let currentRange = 'today';
    async function loadEvents() {
        const resp = await fetch(`/api/events/range?range=${currentRange}`);
        const events = await resp.json();
        renderCards(events);
    }
    function renderCards(events) {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';
        const serviceIcons = { "general":"🏛️","career":"🎓","admin":"🏢","social-ped":"🤝","methodical":"📚","bas":"✈️","external":"🌍","council":"👥","ict":"💻","academic":"📖","physical":"🏋️","organizational":"📋" };
        events.forEach(ev => {
            const col = document.createElement('div');
            col.className = 'col-md-6 col-lg-4 col-xl-3';
            const card = document.createElement('div');
            card.className = `event-card ${!ev.planned ? 'unplanned' : ''}`;
            card.style.borderLeftColor = ev.color || '#0d6efd';
            let dateObj = new Date(ev.date);
            let formattedDate = dateObj.toLocaleDateString('ru-RU', { day:'numeric', month:'long' });
            if (ev.date) formattedDate = `${formattedDate} ${ev.time ? 'в ' + ev.time.slice(0,5) : ''}`;
            let statusIcon = '', statusClass = '';
            switch(ev.status) {
                case 'done': statusIcon='✅'; statusClass='status-done'; break;
                case 'postponed': statusIcon='🔄'; statusClass='status-postponed'; break;
                case 'today': statusIcon='📅'; statusClass='status-today'; break;
                case 'cancelled': statusIcon='❌'; statusClass='status-cancelled'; break;
                default: statusIcon='📋'; statusClass='status-plan';
            }
            const statusText = { done:'Завершено', postponed:'Перенесено', today:'Сегодня', cancelled:'Отменено', plan:'Запланировано' }[ev.status] || '';
            const icon = serviceIcons[ev.service] || '📌';
            const responsibleText = Array.isArray(ev.responsible) ? ev.responsible.join(', ') : ev.responsible;
            card.innerHTML = `
                <div class="card-date">📅 ${formattedDate}</div>
                <div class="card-title"><span class="service-icon">${icon}</span> <span>${escapeHtml(ev.title)}</span></div>
                <div class="card-responsible"><i class="bi bi-person-badge"></i> ${escapeHtml(responsibleText)}</div>
                <div class="card-status"><span class="status-badge ${statusClass}">${statusIcon} ${statusText}</span></div>
            `;
            card.addEventListener('click', () => window.location.href = `/?edit=${ev.id}`);
            col.appendChild(card);
            container.appendChild(col);
        });
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    document.getElementById('showTodayBtn').addEventListener('click', () => { currentRange='today'; document.getElementById('showTodayBtn').classList.add('btn-primary'); document.getElementById('showTodayBtn').classList.remove('btn-outline-primary'); document.getElementById('showMonthBtn').classList.add('btn-outline-primary'); document.getElementById('showMonthBtn').classList.remove('btn-primary'); loadEvents(); });
    document.getElementById('showMonthBtn').addEventListener('click', () => { currentRange='month'; document.getElementById('showMonthBtn').classList.add('btn-primary'); document.getElementById('showMonthBtn').classList.remove('btn-outline-primary'); document.getElementById('showTodayBtn').classList.add('btn-outline-primary'); document.getElementById('showTodayBtn').classList.remove('btn-primary'); loadEvents(); });
    loadEvents();
</script>
</body>
</html>
